name: Build agent installer

# Produces AstraAgentSetup.exe on a Windows runner and (on a tag) publishes it
# to a GitHub Release so the portal can link to it.
#
#   git tag agent-v0.1.0 && git push origin agent-v0.1.0
# or run manually from the Actions tab.

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained agent
        run: >
          dotnet publish agent/src/AstraAgent.Service/AstraAgent.Service.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o agent/install/publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" agent\install\AstraAgent.iss'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstraAgentSetup
          path: agent/install/Output/AstraAgentSetup.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/install/Output/AstraAgentSetup.exe
          fail_on_unmatched_files: true
